<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contentGEN - مولّد محتوى TikTok</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #010101, #1a1a2e);
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 {
      text-align: center;
      color: #fe2c55;
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 30px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #fff;
      margin-bottom: 8px;
      font-weight: bold;
    }
    input, select {
      width: 100%;
      padding: 12px;
      background: #0f0f1a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #fe2c55, #ff0050);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { opacity: 0.9; }
    #loading {
      text-align: center;
      color: #fe2c55;
      display: none;
      margin-top: 20px;
      font-size: 18px;
    }
    #result {
      background: #1a1a2e;
      border: 1px solid #fe2c55;
      border-radius: 15px;
      padding: 30px;
      margin-top: 20px;
      color: #fff;
      display: none;
      white-space: pre-wrap;
      line-height: 2;
    }
    .copy-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 14px;
      width: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎬 contentGEN</h1>
    <p class="subtitle">مولّد محتوى TikTok بالذكاء الاصطناعي</p>

    <div class="card">
      <label>موضوع الفيديو</label>
      <input type="text" id="topic" placeholder="مثال: أفضل 3 تطبيقات للإنتاجية">

      <label>مدة الفيديو</label>
      <select id="duration">
        <option value="15">15 ثانية</option>
        <option value="30">30 ثانية</option>
        <option value="60" selected>60 ثانية</option>
        <option value="90">90 ثانية</option>
      </select>

      <label>الجمهور المستهدف</label>
      <input type="text" id="audience" placeholder="مثال: شباب مهتمون بالتقنية">

      <button onclick="generate()">🚀 ولّد المحتوى</button>
    </div>

    <div id="loading">⏳ جاري توليد المحتوى...</div>

    <div id="result">
      <div id="content"></div>
      <button class="copy-btn" onclick="copyContent()">📋 نسخ المحتوى</button>
    </div>
  </div>

  <script>
    async function generate() {
      const topic = document.getElementById('topic').value;
      const duration = document.getElementById('duration').value;
      const audience = document.getElementById('audience').value;

      if (!topic || !audience) {
        alert('الرجاء ملء جميع الحقول');
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';

      try {
        const response = await fetch('http://localhost:3000/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic, duration, audience })
        });

        const data = await response.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('content').innerText = data.content;
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        alert('حدث خطأ: ' + error.message);
      }
    }

    function copyContent() {
      const content = document.getElementById('content').innerText;
      navigator.clipboard.writeText(content);
      alert('تم النسخ!');
    }
  </script>
</body>
</html>
